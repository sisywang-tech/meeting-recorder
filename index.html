<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="會議記錄">
<meta name="theme-color" content="#0071e3">
<link rel="manifest" href="manifest.json">
<title>會議記錄工具</title>
<style>
:root {
  --blue: #0071e3;
  --red: #ff3b30;
  --bg: #f2f2f7;
  --card: #ffffff;
  --text: #1c1c1e;
  --sub: #6e6e73;
  --border: #e5e5ea;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: calc(100px + var(--safe-bot));
}
.nav {
  background: rgba(242,242,247,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 0.5px solid var(--border);
}
.nav-title { font-size: 17px; font-weight: 600; text-align: center; }
.page { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.card {
  background: var(--card);
  border-radius: 14px;
  overflow: hidden;
}
.card-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  gap: 12px;
}
.card-row:last-child { border-bottom: none; }
.row-label { font-size: 15px; color: var(--text); min-width: 64px; }
.row-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  color: var(--text);
  background: transparent;
  text-align: right;
}
.row-input::placeholder { color: #c7c7cc; }

.rec-card {
  background: var(--card);
  border-radius: 14px;
  padding: 28px 20px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.rec-btn {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .15s;
  -webkit-touch-callout: none;
}
.rec-btn.on { border-color: var(--red); background: #fff1f0; }
.rec-btn svg { width: 32px; height: 32px; }
.timer {
  font-size: 34px;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: .02em;
}
.status-row { display: flex; align-items: center; gap: 6px; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red);
  display: none;
  animation: blink 1s infinite;
}
.dot.show { display: block; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.status-txt { font-size: 14px; color: var(--sub); }

.seg-card { background: var(--card); border-radius: 14px; overflow: hidden; }
.seg-header {
  padding: 12px 16px 10px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.seg-header-txt { font-size: 13px; font-weight: 500; color: var(--sub); }
.seg-count-badge {
  font-size: 12px; color: var(--sub);
  background: var(--bg);
  padding: 2px 8px; border-radius: 99px;
}
.seg-list { padding: 8px 0; min-height: 120px; }
.empty-hint { font-size: 14px; color: #c7c7cc; text-align: center; padding: 32px 0; }
.seg {
  display: flex; gap: 10px;
  padding: 8px 16px;
  border-bottom: 0.5px solid var(--border);
  font-size: 15px; line-height: 1.55;
}
.seg:last-child { border-bottom: none; }
.seg-ts { font-size: 12px; color: #c7c7cc; min-width: 36px; padding-top: 2px; font-variant-numeric: tabular-nums; }
.seg-txt { flex: 1; }
.interim { color: #c7c7cc; font-style: italic; }

.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(242,242,247,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--border);
  padding: 10px 16px calc(10px + var(--safe-bot));
  display: flex; gap: 8px; flex-wrap: wrap;
}
.action-btn {
  flex: 1; min-width: 130px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 12px;
  border-radius: 12px;
  border: none;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  background: var(--card);
  color: var(--blue);
  border: 0.5px solid var(--border);
}
.action-btn:disabled { opacity: .35; }
.action-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.warn {
  font-size: 13px; color: var(--red);
  background: #fff1f0;
  padding: 10px 14px;
  border-radius: 10px;
  text-align: center;
  width: 100%;
}
</style>
</head>
<body>

<div class="nav"><div class="nav-title">會議記錄工具</div></div>

<div class="page">

  <div class="card">
    <div class="card-row">
      <span class="row-label">會議主題</span>
      <input class="row-input" type="text" id="m-title" placeholder="輸入主題">
    </div>
    <div class="card-row">
      <span class="row-label">主持人</span>
      <input class="row-input" type="text" id="m-host" placeholder="姓名">
    </div>
    <div class="card-row">
      <span class="row-label">出席人員</span>
      <input class="row-input" type="text" id="m-att" placeholder="以逗號分隔">
    </div>
    <div class="card-row">
      <span class="row-label">日期</span>
      <input class="row-input" type="date" id="m-date">
    </div>
  </div>

  <div class="rec-card">
    <button class="rec-btn" id="rec-btn" onclick="toggleRec()">
      <svg id="mic-svg" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div class="timer" id="timer">00:00</div>
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span class="status-txt" id="status-txt">點擊麥克風開始錄音</span>
    </div>
    <div id="warn-box" style="width:100%"></div>
  </div>

  <div class="seg-card">
    <div class="seg-header">
      <span class="seg-header-txt">即時逐字稿</span>
      <span class="seg-count-badge" id="seg-count">0 段</span>
    </div>
    <div class="seg-list" id="seg-list">
      <div class="empty-hint" id="empty-hint">錄音後將即時顯示文字</div>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <button class="action-btn" id="copy-btn" onclick="copyText()" disabled>複製逐字稿</button>
  <button class="action-btn primary" id="ai-btn" onclick="openClaude()" disabled>用 Claude 整理 ↗</button>
  <button class="action-btn" id="clear-btn" onclick="clearAll()" disabled>清除</button>
</div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

let rec=null,segs=[],timerInt=null,startTime=null,isRec=false;
document.getElementById('m-date').value=new Date().toISOString().split('T')[0];

function fmt(ms){const s=Math.floor(ms/1000);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function toggleRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('warn-box').innerHTML='<div class="warn">⚠️ iPhone 需使用 Safari 瀏覽器才支援語音辨識</div>';
    return;
  }
  isRec?stopRec():startRec();
}

function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();rec.lang='zh-TW';rec.continuous=true;rec.interimResults=true;
  isRec=true;startTime=Date.now();
  document.getElementById('rec-btn').classList.add('on');
  document.getElementById('mic-svg').setAttribute('stroke','#ff3b30');
  document.getElementById('status-txt').textContent='錄音中，再點一次停止';
  document.getElementById('dot').classList.add('show');
  document.getElementById('warn-box').innerHTML='';
  timerInt=setInterval(()=>document.getElementById('timer').textContent=fmt(Date.now()-startTime),500);
  let segStart=startTime;
  rec.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final){segs.push({ts:fmt(segStart-startTime),text:final.trim()});segStart=Date.now();renderSegs();}
    if(interim)showInterim(fmt(segStart-startTime),interim);
  };
  rec.onerror=(e)=>{
    if(e.error==='not-allowed')document.getElementById('warn-box').innerHTML='<div class="warn">請允許麥克風權限：設定 → Safari → 麥克風 → 允許</div>';
  };
  rec.onend=()=>{if(isRec)rec.start();};
  rec.start();
}

function stopRec(){
  isRec=false;rec&&rec.stop();rec=null;
  clearInterval(timerInt);
  document.getElementById('rec-btn').classList.remove('on');
  document.getElementById('mic-svg').setAttribute('stroke','#555');
  document.getElementById('status-txt').textContent=segs.length?'錄音完成':'點擊麥克風開始錄音';
  document.getElementById('dot').classList.remove('show');
  removeInterim();
  if(segs.length)['copy-btn','ai-btn','clear-btn'].forEach(id=>document.getElementById(id).disabled=false);
}

function renderSegs(){
  const list=document.getElementById('seg-list');
  document.getElementById('empty-hint')&&(document.getElementById('empty-hint').style.display='none');
  const interim=document.getElementById('interim-row');
  [...list.querySelectorAll('.seg:not(#interim-row)')].forEach(r=>r.remove());
  const frag=document.createDocumentFragment();
  segs.forEach(s=>{
    const d=document.createElement('div');d.className='seg';
    d.innerHTML=`<span class="seg-ts">${s.ts}</span><span class="seg-txt">${s.text}</span>`;
    frag.appendChild(d);
  });
  interim?list.insertBefore(frag,interim):list.appendChild(frag);
  document.getElementById('seg-count').textContent=segs.length+' 段';
  list.scrollTop=list.scrollHeight;
}

function showInterim(ts,txt){
  let row=document.getElementById('interim-row');
  if(!row){row=document.createElement('div');row.className='seg';row.id='interim-row';document.getElementById('seg-list').appendChild(row);}
  row.innerHTML=`<span class="seg-ts">${ts}</span><span class="seg-txt interim">${txt}</span>`;
}
function removeInterim(){const r=document.getElementById('interim-row');r&&r.remove();}

function buildText(){
  const title=document.getElementById('m-title').value;
  const host=document.getElementById('m-host').value;
  const att=document.getElementById('m-att').value;
  const date=document.getElementById('m-date').value;
  let out='';
  if(title||host||att){out+='【會議資訊】\n';if(title)out+=`主題：${title}\n`;if(host)out+=`主持人：${host}\n`;if(att)out+=`出席人員：${att}\n`;if(date)out+=`日期：${date}\n`;out+='\n';}
  out+='【逐字稿】\n';
  segs.forEach(s=>{out+=`[${s.ts}] ${s.text}\n`;});
  return out;
}

function copyText(){
  const txt=buildText();
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('copy-btn');
    const o=btn.textContent;btn.textContent='✓ 已複製';
    setTimeout(()=>btn.textContent=o,2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    const btn=document.getElementById('copy-btn');
    const o=btn.textContent;btn.textContent='✓ 已複製';
    setTimeout(()=>btn.textContent=o,2000);
  });
}

function openClaude(){
  const txt=buildText();
  const prompt=`請將以下會議逐字稿整理成正式會議記錄，包含：主題、出席人員、討論重點、決議事項、待辦行動（含負責人與期限）。\n\n${txt}`;
  const url='https://claude.ai/new?q='+encodeURIComponent(prompt);
  window.open(url,'_blank');
}

function clearAll(){
  segs=[];isRec&&stopRec();
  document.getElementById('seg-list').innerHTML='<div class="empty-hint" id="empty-hint">錄音後將即時顯示文字</div>';
  document.getElementById('timer').textContent='00:00';
  document.getElementById('status-txt').textContent='點擊麥克風開始錄音';
  document.getElementById('seg-count').textContent='0 段';
  ['copy-btn','ai-btn','clear-btn'].forEach(id=>document.getElementById(id).disabled=true);
}
</script>
</body>
</html>
